{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Reset password{% endblock %}

{% block content %}
<div class="container" style="max-width: 480px;">
    <h1 class="h4 mb-3">Reset password</h1>
    <p class="text-muted small">We will email instructions to the address you provide (console backend in development).</p>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-primary">Send reset link</button>
    </form>
    <p class="small mt-3"><a href="{% url 'club:login' %}">Back to login</a></p>
</div>
{% endblock %}
