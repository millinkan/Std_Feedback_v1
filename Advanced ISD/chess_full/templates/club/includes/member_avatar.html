{% if show_img %}
    <img
        src="{{ member.avatar.url }}"
        alt="{{ alt }}"
        width="{{ size }}"
        height="{{ size }}"
        class="member-avatar-img rounded-circle {{ extra_class }}"
        style="width: {{ size }}px; height: {{ size }}px; object-fit: cover;"
        loading="lazy"
        decoding="async"
    >
{% else %}
    <span
        class="member-avatar-placeholder rounded-circle d-inline-flex align-items-center justify-content-center fw-semibold user-select-none {{ extra_class }}"
        style="width: {{ size }}px; height: {{ size }}px; font-size: {{ font_px }}px; line-height: 1;"
        aria-hidden="true"
    >{{ initial }}</span>
{% endif %}
